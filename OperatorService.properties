server.port=8082

spring.datasource.url=jdbc:mysql://localhost:3306/OmniOperatorsDb?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=Aditya@18

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Monitoring
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
logging.level.com.example.demo=DEBUG

# Resilience4j / Circuit Breaker
resilience4j.circuitbreaker.configs.default.registerHealthIndicator=true
resilience4j.circuitbreaker.configs.default.slidingWindowSize=10
resilience4j.circuitbreaker.configs.default.minimumNumberOfCalls=5
resilience4j.circuitbreaker.configs.default.failureRateThreshold=50
resilience4j.circuitbreaker.configs.default.waitDurationInOpenState=5s
spring.cloud.openfeign.circuitbreaker.enabled=true

# Distributed Tracing (Zipkin)
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans

#---
spring.config.activate.on-profile=docker
eureka.client.serviceUrl.defaultZone=http://eureka-service:8761/eureka/
spring.datasource.url=jdbc:mysql://mysql:3306/omnicharge?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=Aditya@18
management.zipkin.tracing.endpoint=http://zipkin:9411/api/v2/spans

# Handle API Gateway Forwarded Headers
server.forward-headers-strategy=FRAMEWORK

eureka.client.enabled=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true
