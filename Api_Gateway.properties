server.port=8080

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# Support for forwarded headers
server.forward-headers-strategy=FRAMEWORK

# ===== Swagger / SpringDoc OpenAPI =====
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.operations-sorter=alpha
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.disable-swagger-default-url=true

springdoc.swagger-ui.urls[0].name=User Service
springdoc.swagger-ui.urls[0].url=/user-service/v3/api-docs
springdoc.swagger-ui.urls[1].name=Operator Service
springdoc.swagger-ui.urls[1].url=/operator-service/v3/api-docs
springdoc.swagger-ui.urls[2].name=Recharge Service
springdoc.swagger-ui.urls[2].url=/recharge-service/v3/api-docs
springdoc.swagger-ui.urls[3].name=Payment Service
springdoc.swagger-ui.urls[3].url=/payment-service/v3/api-docs
springdoc.swagger-ui.urls[4].name=Notification Service
springdoc.swagger-ui.urls[4].url=/notification-service/v3/api-docs

# ===== Monitoring & Actuator =====
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.metrics.export.prometheus.enabled=true

# ===== Resilience4j / Circuit Breaker =====
resilience4j.circuitbreaker.configs.default.registerHealthIndicator=true
resilience4j.circuitbreaker.configs.default.slidingWindowSize=10
resilience4j.circuitbreaker.configs.default.minimumNumberOfCalls=5
resilience4j.circuitbreaker.configs.default.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.configs.default.waitDurationInOpenState=5s
resilience4j.circuitbreaker.configs.default.failureRateThreshold=50
resilience4j.timelimiter.configs.default.timeoutDuration=5s

# Distributed Tracing (Zipkin)
management.tracing.sampling.probability=1.0
management.tracing.enabled=true
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans

# ===== Swagger Proxy Routes =====
spring.cloud.gateway.mvc.routes[200].id=user-service-docs
spring.cloud.gateway.mvc.routes[200].uri=lb://USERSERVICE
spring.cloud.gateway.mvc.routes[200].predicates[0]=Path=/user-service/v3/api-docs
spring.cloud.gateway.mvc.routes[200].filters[0]=SetPath=/v3/api-docs
spring.cloud.gateway.mvc.routes[200].filters[1]=CircuitBreaker=userServiceCB,forward:/fallback/user-service

spring.cloud.gateway.mvc.routes[201].id=operator-service-docs
spring.cloud.gateway.mvc.routes[201].uri=lb://OPERATORSERVICE
spring.cloud.gateway.mvc.routes[201].predicates[0]=Path=/operator-service/v3/api-docs
spring.cloud.gateway.mvc.routes[201].filters[0]=SetPath=/v3/api-docs
spring.cloud.gateway.mvc.routes[201].filters[1]=CircuitBreaker=operatorServiceCB,forward:/fallback/operator-service

spring.cloud.gateway.mvc.routes[202].id=recharge-service-docs
spring.cloud.gateway.mvc.routes[202].uri=lb://RECHARGESERVICE
spring.cloud.gateway.mvc.routes[202].predicates[0]=Path=/recharge-service/v3/api-docs
spring.cloud.gateway.mvc.routes[202].filters[0]=SetPath=/v3/api-docs
spring.cloud.gateway.mvc.routes[202].filters[1]=CircuitBreaker=rechargeServiceCB,forward:/fallback/recharge-service

spring.cloud.gateway.mvc.routes[203].id=payment-service-docs
spring.cloud.gateway.mvc.routes[203].uri=lb://PAYMENTSERVICE
spring.cloud.gateway.mvc.routes[203].predicates[0]=Path=/payment-service/v3/api-docs
spring.cloud.gateway.mvc.routes[203].filters[0]=SetPath=/v3/api-docs
spring.cloud.gateway.mvc.routes[203].filters[1]=CircuitBreaker=paymentServiceCB,forward:/fallback/payment-service

spring.cloud.gateway.mvc.routes[204].id=notification-service-docs
spring.cloud.gateway.mvc.routes[204].uri=lb://NOTIFICATIONSERVICE
spring.cloud.gateway.mvc.routes[204].predicates[0]=Path=/notification-service/v3/api-docs
spring.cloud.gateway.mvc.routes[204].filters[0]=SetPath=/v3/api-docs
spring.cloud.gateway.mvc.routes[204].filters[1]=CircuitBreaker=notificationServiceCB,forward:/fallback/notification-service

# ===== API Routes =====
spring.cloud.gateway.mvc.routes[205].id=user-service
spring.cloud.gateway.mvc.routes[205].uri=lb://USERSERVICE
spring.cloud.gateway.mvc.routes[205].predicates[0]=Path=/user/**, /auth/**, /admin/**
spring.cloud.gateway.mvc.routes[205].filters[0]=CircuitBreaker=userServiceCB,forward:/fallback/user-service

spring.cloud.gateway.mvc.routes[206].id=operator-service
spring.cloud.gateway.mvc.routes[206].uri=lb://OPERATORSERVICE
spring.cloud.gateway.mvc.routes[206].predicates[0]=Path=/operator/**
spring.cloud.gateway.mvc.routes[206].filters[0]=CircuitBreaker=operatorServiceCB,forward:/fallback/operator-service

spring.cloud.gateway.mvc.routes[207].id=recharge-service
spring.cloud.gateway.mvc.routes[207].uri=lb://RECHARGESERVICE
spring.cloud.gateway.mvc.routes[207].predicates[0]=Path=/api/recharges/**
spring.cloud.gateway.mvc.routes[207].filters[0]=CircuitBreaker=rechargeServiceCB,forward:/fallback/recharge-service

spring.cloud.gateway.mvc.routes[208].id=payment-service
spring.cloud.gateway.mvc.routes[208].uri=lb://PAYMENTSERVICE
spring.cloud.gateway.mvc.routes[208].predicates[0]=Path=/api/payments/**
spring.cloud.gateway.mvc.routes[208].filters[0]=CircuitBreaker=paymentServiceCB,forward:/fallback/payment-service

# GLOBAL CORS
spring.cloud.gateway.mvc.globalcors.cors-configurations.[/**].allowedOrigins=http://localhost:4200
spring.cloud.gateway.mvc.globalcors.cors-configurations.[/**].allowedMethods=*
spring.cloud.gateway.mvc.globalcors.cors-configurations.[/**].allowedHeaders=*

# LOGGING
logging.level.org.springframework.cloud.gateway=DEBUG

#---
spring.config.activate.on-profile=docker
eureka.client.serviceUrl.defaultZone=http://eureka-service:8761/eureka/
management.zipkin.tracing.endpoint=http://zipkin:9411/api/v2/spans
