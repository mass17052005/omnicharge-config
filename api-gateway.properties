server.port=8080
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# Note the addition of .mvc. in all the route lines below
spring.cloud.gateway.mvc.routes[0].id=user-service-auth
spring.cloud.gateway.mvc.routes[0].uri=lb://user-service
spring.cloud.gateway.mvc.routes[0].predicates[0]=Path=/api/auth/**

spring.cloud.gateway.mvc.routes[1].id=user-service
spring.cloud.gateway.mvc.routes[1].uri=lb://user-service
spring.cloud.gateway.mvc.routes[1].predicates[0]=Path=/api/users/**
# I have commented out the filter for now (see explanation below)
# spring.cloud.gateway.mvc.routes[1].filters[0]=JwtAuthFilter

spring.cloud.gateway.mvc.routes[2].id=operator-service
spring.cloud.gateway.mvc.routes[2].uri=lb://operator-service
spring.cloud.gateway.mvc.routes[2].predicates[0]=Path=/api/operators/**
# spring.cloud.gateway.mvc.routes[2].filters[0]=JwtAuthFilter

app.jwt.secret=omnicharge-secret-key-must-be-at-least-32-chars-long

management.endpoints.web.exposure.include=*
